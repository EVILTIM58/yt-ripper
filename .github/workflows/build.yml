yamlname: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly rebuild (Mon 09:00 UTC) so the baked-in yt-dlp stays current.
    # yt-dlp goes stale when YouTube changes things — a stale image is the
    # #1 failure mode for this app. After it runs, redeploy on the NAS with
    # "Pull the latest image" ticked.
    - cron: "0 9 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # NOTE: image name MUST be lowercase (eviltim58, not EVILTIM58).
      # Do not switch to ${{ github.repository_owner }} — it preserves case
      # and breaks the push. (Playbook Section 5, lesson 3.)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/eviltim58/yt-ripper:latest
            ghcr.io/eviltim58/yt-ripper:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
